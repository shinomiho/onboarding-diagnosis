<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入社適性チェック｜リミー / RE:Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 入力フォーム -->
  <div id="form-screen">
    <div class="container">
      <div class="header">
        <img src="logo.jpg" alt="リミー" class="logo-img">
        <div id="company-badge" class="company-badge hidden"></div>
        <h1>入社オンボーディング診断</h1>
        <p class="subtitle">あなたの状況を正直に教えてください。<br>結果はあなたのサポートのために使われます。</p>
        <div class="privacy-notice">
          <span class="privacy-notice-icon">🔒</span>
          <span>入力された情報は診断レポート生成のみに使用します。AI処理のためAnthropicに送信されますが、第三者への提供・販売は一切行いません。詳しくは<a href="privacy.html" target="_blank">プライバシーポリシー</a>をご確認ください。</span>
        </div>
      </div>

      <form id="diagnosis-form">
        <div class="profile-fields">
          <div class="profile-row">
            <div class="profile-item">
              <label for="employee-name">お名前</label>
              <input type="text" id="employee-name" placeholder="例：山田 太郎" required>
            </div>
            <div class="profile-item">
              <label for="employee-email">メールアドレス</label>
              <input type="email" id="employee-email" placeholder="例：taro@example.com" required>
            </div>
          </div>
          <div class="profile-row">
            <div class="profile-item">
              <label for="employee-gender">性別</label>
              <select id="employee-gender" required>
                <option value="">選択してください</option>
                <option value="男性">男性</option>
                <option value="女性">女性</option>
                <option value="その他">その他</option>
                <option value="回答しない">回答しない</option>
              </select>
            </div>
            <div class="profile-item">
              <label for="employee-age">年齢</label>
              <select id="employee-age" required>
                <option value="">選択してください</option>
                <option value="20歳未満">20歳未満</option>
                <option value="20〜24歳">20〜24歳</option>
                <option value="25〜29歳">25〜29歳</option>
                <option value="30〜34歳">30〜34歳</option>
                <option value="35〜39歳">35〜39歳</option>
                <option value="40〜44歳">40〜44歳</option>
                <option value="45歳以上">45歳以上</option>
              </select>
            </div>
          </div>
          <div class="profile-row">
            <div class="profile-item">
              <label for="employee-job">職種</label>
              <select id="employee-job" required>
                <option value="">選択してください</option>
                <option value="営業・販売">営業・販売</option>
                <option value="エンジニア・技術職">エンジニア・技術職</option>
                <option value="事務・管理">事務・管理</option>
                <option value="マーケティング・企画">マーケティング・企画</option>
                <option value="製造・現場">製造・現場</option>
                <option value="医療・介護">医療・介護</option>
                <option value="教育">教育</option>
                <option value="クリエイティブ">クリエイティブ</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div class="profile-item">
              <label for="employee-type">入社形態</label>
              <select id="employee-type" required>
                <option value="">選択してください</option>
                <option value="新卒入社">新卒入社</option>
                <option value="中途入社">中途入社</option>
                <option value="転籍・異動">転籍・異動</option>
              </select>
            </div>
            <div class="profile-item">
              <label for="employee-milestone">診断タイミング</label>
              <select id="employee-milestone" required>
                <option value="">選択してください</option>
                <option value="15日">入社15日頃</option>
                <option value="30日">入社30日頃</option>
                <option value="60日">入社60日頃</option>
                <option value="90日">入社90日頃</option>
                <option value="90〜180日">入社90〜180日頃（3〜6ヶ月）</option>
                <option value="180〜360日">入社180〜360日頃（6ヶ月〜1年）</option>
                <option value="1年以上">入社1年以上</option>
              </select>
            </div>
          </div>
        </div>

        <div class="questions" id="questions-container"></div>

        <div class="consent-box">
          <label class="consent-label">
            <input type="checkbox" id="consent-check">
            <span class="consent-text">
              <a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意します。入力情報はAI診断レポート生成のためAnthropicに送信されます。
            </span>
          </label>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          診断結果を見る
        </button>
      </form>
    </div>
  </div>

  <!-- ローディング -->
  <div id="loading-screen" class="hidden">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>あなたのデータを分析中です…</p>
      <p class="loading-sub">マネージャー向けレポートを生成しています</p>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" class="hidden">
    <div class="container">
      <div class="header">
        <img src="logo.jpg" alt="リミー" class="logo-img">
        <h2 id="result-name-title">診断レポート</h2>
      </div>

      <!-- レーダーチャート -->
      <div class="chart-section">
        <h3>5軸スコア</h3>
        <canvas id="radar-chart" width="480" height="340" style="max-width:100%;height:auto;"></canvas>
      </div>

      <!-- スコアバー -->
      <div class="score-bars" id="score-bars"></div>

      <!-- AIレポート -->
      <div class="ai-report">
        <div class="report-label">あなたへのパーソナルレポート</div>
        <div id="ai-report-content" class="report-content"></div>
      </div>

      <div class="result-actions">
        <button class="action-btn action-pdf" onclick="downloadPdf()">📄 PDFで保存</button>
        <button class="action-btn action-copy" id="copy-url-btn" onclick="copyResultUrl()">🔗 結果URLをコピー</button>
      </div>
      <button class="restart-btn no-print" onclick="restart()">もう一度診断する</button>
    </div>
  </div>

  <!-- APIキーモーダル（無効化：Apps Scriptに移行済み） -->
  <div id="api-modal" class="modal-overlay hidden"></div>

  <!-- AIチャット -->
  <button id="ai-fab" onclick="toggleAiPanel()" aria-label="AIに質問する">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <span>AIに聞く</span>
  </button>

  <div id="ai-panel">
    <div id="ai-panel-header">
      <span>🤖 AIサポート</span>
      <button onclick="toggleAiPanel()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;line-height:1;">✕</button>
    </div>
    <div id="ai-chat-body">
      <div class="ai-msg ai-msg-bot">こんにちは！診断フォームについて何でも聞いてください。よくある質問から選ぶか、直接入力してください。</div>
    </div>
    <div id="ai-quick-qs"></div>
    <div id="ai-input-row">
      <input id="ai-input" type="text" placeholder="質問を入力…" onkeydown="if(event.key==='Enter')sendAiMsg()">
      <button onclick="sendAiMsg()">送信</button>
    </div>
  </div>

  <style>
    #ai-fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 1000;
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white; border: none; border-radius: 50px;
      padding: 12px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 16px rgba(79,70,229,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #ai-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,70,229,0.5); }
    #ai-panel {
      position: fixed; bottom: 80px; right: 24px; z-index: 999;
      width: 340px; background: white; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18); display: none; flex-direction: column;
      max-height: 480px; overflow: hidden;
    }
    #ai-panel.open { display: flex; }
    #ai-panel-header {
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: white; padding: 14px 16px; font-weight: 700; font-size: 14px;
      display: flex; justify-content: space-between; align-items: center;
      border-radius: 16px 16px 0 0;
    }
    #ai-chat-body {
      flex: 1; overflow-y: auto; padding: 12px; display: flex;
      flex-direction: column; gap: 8px; min-height: 140px;
    }
    .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; max-width: 88%; }
    .ai-msg-bot { background: #EEF2FF; color: #1e1b4b; align-self: flex-start; }
    .ai-msg-user { background: #4F46E5; color: white; align-self: flex-end; }
    .ai-msg-loading { background: #EEF2FF; color: #6B7280; font-style: italic; align-self: flex-start; }
    #ai-quick-qs { padding: 8px 12px; display: flex; flex-wrap: wrap; gap: 6px; border-top: 1px solid #F3F4F6; }
    .ai-quick-btn {
      background: #EEF2FF; color: #4338CA; border: 1px solid #C7D2FE;
      border-radius: 20px; padding: 5px 12px; font-size: 11px;
      cursor: pointer; white-space: nowrap; transition: background 0.15s;
    }
    .ai-quick-btn:hover { background: #C7D2FE; }
    #ai-input-row { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #F3F4F6; }
    #ai-input {
      flex: 1; border: 1px solid #E5E7EB; border-radius: 8px;
      padding: 8px 12px; font-size: 13px; outline: none;
    }
    #ai-input:focus { border-color: #4F46E5; }
    #ai-input-row button {
      background: #4F46E5; color: white; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    @media (max-width: 400px) {
      #ai-panel { width: calc(100vw - 32px); right: 16px; bottom: 76px; }
    }
  </style>

  <script src="app.js"></script>
</body>
</html>
