<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>診断結果｜リミー / RE:Me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loading-screen">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>結果を読み込んでいます…</p>
    </div>
  </div>

  <div id="result-screen" class="hidden">
    <div class="container">
      <div class="header">
        <img src="logo.jpg" alt="リミー" class="logo-img">
        <h2 id="result-name-title">診断レポート</h2>
        <p id="result-date" class="subtitle"></p>
      </div>

      <div class="chart-section">
        <h3>6因子スコア</h3>
        <canvas id="radar-chart" width="480" height="340" style="max-width:100%;height:auto;"></canvas>
      </div>

      <div class="score-bars" id="score-bars"></div>

      <div class="ai-report">
        <div class="report-label">あなたへのパーソナルレポート</div>
        <div id="ai-report-content" class="report-content"></div>
      </div>

      <div class="result-actions no-print">
        <button class="action-btn action-pdf" onclick="window.print()">📄 PDFで保存</button>
      </div>

      <!-- フィードバック -->
      <div class="no-print" id="fb-section" style="margin:32px 0 48px;background:#F9FAFB;border-radius:16px;padding:24px;border:1px solid #E5E7EB;">
        <p style="font-size:14px;font-weight:800;color:#1F2937;margin:0 0 4px;">📝 この診断はいかがでしたか？</p>
        <p style="font-size:12px;color:#6B7280;margin:0 0 20px;">所要時間：約2分（任意）。ご意見はサービス改善に活用します。</p>

        <div id="fb-form-emp">

          <!-- Q1: 全体満足度（絵文字） -->
          <div style="margin-bottom:18px;">
            <p style="font-size:12px;font-weight:700;color:#374151;margin:0 0 8px;">Q1. 全体的な満足度</p>
            <div style="display:flex;gap:8px;" id="fb-stars">
              <button onclick="fbRate(1)" class="fb-star" id="fs1">😞</button>
              <button onclick="fbRate(2)" class="fb-star" id="fs2">😐</button>
              <button onclick="fbRate(3)" class="fb-star" id="fs3">🙂</button>
              <button onclick="fbRate(4)" class="fb-star" id="fs4">😊</button>
              <button onclick="fbRate(5)" class="fb-star" id="fs5">🤩</button>
            </div>
          </div>

          <!-- Q2: 診断結果の正確さ -->
          <div style="margin-bottom:14px;">
            <p style="font-size:12px;font-weight:700;color:#374151;margin:0 0 8px;">Q2. 診断結果はあなたの実際の状況に合っていましたか？</p>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <label class="emp-opt"><input type="radio" name="eq2" value="よく合っていた">よく合っていた</label>
              <label class="emp-opt"><input type="radio" name="eq2" value="まあまあ合っていた">まあまあ合っていた</label>
              <label class="emp-opt"><input type="radio" name="eq2" value="あまり合っていなかった">あまり合っていなかった</label>
              <label class="emp-opt"><input type="radio" name="eq2" value="わからない">わからない</label>
            </div>
          </div>

          <!-- Q3: 設問の量 -->
          <div style="margin-bottom:14px;">
            <p style="font-size:12px;font-weight:700;color:#374151;margin:0 0 8px;">Q3. 設問の数はいかがでしたか？</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <label class="emp-opt"><input type="radio" name="eq3" value="少なすぎた">少なすぎた</label>
              <label class="emp-opt"><input type="radio" name="eq3" value="ちょうどよかった">ちょうどよかった</label>
              <label class="emp-opt"><input type="radio" name="eq3" value="多すぎた">多すぎた</label>
            </div>
          </div>

          <!-- Q4: AIレポートのわかりやすさ -->
          <div style="margin-bottom:14px;">
            <p style="font-size:12px;font-weight:700;color:#374151;margin:0 0 8px;">Q4. AIレポートの内容はわかりやすかったですか？</p>
            <div style="display:flex;flex-direction:column;gap:6px;">
              <label class="emp-opt"><input type="radio" name="eq4" value="とてもわかりやすかった">とてもわかりやすかった</label>
              <label class="emp-opt"><input type="radio" name="eq4" value="わかりやすかった">わかりやすかった</label>
              <label class="emp-opt"><input type="radio" name="eq4" value="少しわかりにくかった">少しわかりにくかった</label>
              <label class="emp-opt"><input type="radio" name="eq4" value="わかりにくかった">わかりにくかった</label>
            </div>
          </div>

          <!-- Q5: 推薦意向 -->
          <div style="margin-bottom:14px;">
            <p style="font-size:12px;font-weight:700;color:#374151;margin:0 0 8px;">Q5. この診断を同僚や知人に勧めたいと思いますか？</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <label class="emp-opt"><input type="radio" name="eq5" value="ぜひ勧めたい">ぜひ勧めたい</label>
              <label class="emp-opt"><input type="radio" name="eq5" value="内容次第で">内容次第で</label>
              <label class="emp-opt"><input type="radio" name="eq5" value="あまり勧めたくない">あまり勧めたくない</label>
            </div>
          </div>

          <!-- Q6: 自由コメント -->
          <div style="margin-bottom:16px;">
            <p style="font-size:12px;font-weight:700;color:#374151;margin:0 0 8px;">Q6. ご感想・気になった点など（任意）</p>
            <textarea id="fb-comment" rows="3" placeholder="良かった点、改善してほしい点など、何でもどうぞ" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid #E5E7EB;font-size:13px;font-family:inherit;resize:vertical;outline:none;"></textarea>
          </div>

          <button onclick="fbSubmit()" id="fb-btn" style="background:#4F46E5;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;">送信する</button>
          <p id="fb-done" style="display:none;font-size:13px;color:#10B981;margin-top:10px;font-weight:700;text-align:center;">ありがとうございました！</p>
        </div>
      </div>

      <style>
        .fb-star { background:none;border:2px solid #E5E7EB;border-radius:8px;font-size:22px;width:48px;height:48px;cursor:pointer;transition:all 0.15s; }
        .fb-star.on { border-color:#4F46E5;background:#EEF2FF; }
        .emp-opt { display:flex;align-items:center;gap:8px;font-size:13px;color:#374151;cursor:pointer;padding:8px 12px;border-radius:8px;border:1.5px solid #E5E7EB;background:#fff;transition:all 0.15s; }
        .emp-opt:hover { background:#EEF2FF;border-color:#4F46E5; }
        .emp-opt input { accent-color:#4F46E5;flex-shrink:0; }
      </style>
      <script>
        var fbRating = 0;
        function fbRate(n) {
          fbRating = n;
          for (var i=1;i<=5;i++) document.getElementById('fs'+i).classList.toggle('on', i===n);
        }
        function empRadio(name) {
          var el = document.querySelector('input[name="'+name+'"]:checked');
          return el ? el.value : '未回答';
        }
        function fbSubmit() {
          var btn = document.getElementById('fb-btn');
          if (!fbRating) { alert('Q1の満足度を選択してください'); return; }
          btn.disabled = true; btn.textContent = '送信中...';
          var params = new URLSearchParams(location.search);
          var structured =
            '【Q2 診断の正確さ】' + empRadio('eq2') + '\n' +
            '【Q3 設問の量】' + empRadio('eq3') + '\n' +
            '【Q4 レポートのわかりやすさ】' + empRadio('eq4') + '\n' +
            '【Q5 推薦意向】' + empRadio('eq5') + '\n' +
            '【Q6 自由コメント】' + (document.getElementById('fb-comment').value.trim() || 'なし');
          fetch(APPS_SCRIPT_URL, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              action:'record_feedback',
              companyCode: params.get('code') || '',
              email: params.get('id') || '',
              rating: fbRating,
              comments: structured,
              type: 'employee'
            })
          }).then(function(){
            document.getElementById('fb-form-emp').innerHTML =
              '<div style="text-align:center;padding:16px 0;"><p style="font-size:28px;margin-bottom:8px;">🎉</p><p style="font-size:15px;font-weight:800;color:#10B981;">ありがとうございました！</p><p style="font-size:12px;color:#6B7280;margin-top:6px;">いただいたご意見はサービス改善に活用します。</p></div>';
          }).catch(function(){
            btn.disabled=false; btn.textContent='送信する';
          });
        }
      </script>
    </div>
  </div>

  <div id="error-screen" class="hidden">
    <div class="container" style="padding-top:80px;text-align:center;">
      <img src="logo.jpg" alt="リミー" class="logo-img" style="margin:0 auto 24px;">
      <p style="color:#EF4444;font-size:15px;line-height:1.8;">結果が見つかりませんでした。<br>URLを確認してください。</p>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGceshWFX-_kepVh5KHTvNwsrNAh7hW22U48KSp4DVvohXurOsAa6BDW7MFrsbKJ0n/exec';

    const FACTORS = {
      A: { label: '立ち上がり・戦力化' },
      B: { label: '組織エンゲージメント' },
      C: { label: 'ウェルビーイング' },
      D: { label: '離職予兆' },
      E: { label: '継続定着意思' },
    };

    window.onload = async () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { showError(); return; }

      try {
        const res = await fetch(`${APPS_SCRIPT_URL}?action=get_result&id=${id}`);
        const data = await res.json();
        if (!data.success) throw new Error();
        renderResult(data.result);
      } catch {
        showError();
      }
    };

    function renderResult(r) {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('result-name-title').textContent = `${r.name} さんの診断レポート`;
      document.getElementById('result-date').textContent = new Date(r.timestamp).toLocaleDateString('ja-JP') + ' 実施';

      renderScoreBars(r.scores);
      renderRadarChart(r.scores);
      document.getElementById('ai-report-content').innerHTML = renderReport(r.employeeReport);
    }

    function showError() {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('error-screen').classList.remove('hidden');
    }

    function renderScoreBars(scores) {
      const container = document.getElementById('score-bars');
      container.innerHTML = '';
      for (const [key, factor] of Object.entries(FACTORS)) {
        const val = scores[key];
        const pct = (val / 5) * 100;
        const cls = val >= 3.5 ? 'score-high' : val >= 2.5 ? 'score-mid' : 'score-low';
        container.innerHTML += `
          <div class="score-bar-item">
            <div class="score-bar-header">
              <span class="score-bar-label">${factor.label}</span>
              <span class="score-bar-value">${parseFloat(val).toFixed(1)}</span>
            </div>
            <div class="score-bar-track">
              <div class="score-bar-fill ${cls}" style="width:${pct}%"></div>
            </div>
          </div>`;
      }
    }

    function renderRadarChart(scores) {
      const canvas = document.getElementById('radar-chart');
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W/2, cy = H/2, R = Math.min(W,H)/2 - 50;
      const labels = Object.values(FACTORS).map(f => f.label);
      const vals = ['A','B','C','D','E'].map(k => scores[k] / 5);
      const N = labels.length;
      ctx.clearRect(0, 0, W, H);
      for (let r = 1; r <= 5; r++) {
        ctx.beginPath();
        for (let i = 0; i < N; i++) {
          const a = (Math.PI*2*i/N) - Math.PI/2;
          const x = cx + (R*r/5)*Math.cos(a), y = cy + (R*r/5)*Math.sin(a);
          i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.closePath(); ctx.strokeStyle='#E5E7EB'; ctx.lineWidth=1; ctx.stroke();
      }
      for (let i = 0; i < N; i++) {
        const a = (Math.PI*2*i/N) - Math.PI/2;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
        ctx.strokeStyle='#E5E7EB'; ctx.lineWidth=1; ctx.stroke();
      }
      ctx.beginPath();
      for (let i = 0; i < N; i++) {
        const a = (Math.PI*2*i/N) - Math.PI/2;
        const x = cx+R*vals[i]*Math.cos(a), y = cy+R*vals[i]*Math.sin(a);
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.closePath(); ctx.fillStyle='rgba(79,70,229,0.15)'; ctx.fill();
      ctx.strokeStyle='#4F46E5'; ctx.lineWidth=2; ctx.stroke();
      for (let i = 0; i < N; i++) {
        const a = (Math.PI*2*i/N) - Math.PI/2;
        const x = cx+R*vals[i]*Math.cos(a), y = cy+R*vals[i]*Math.sin(a);
        ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fillStyle='#4F46E5'; ctx.fill();
      }
      ctx.fillStyle='#374151'; ctx.font='11px sans-serif'; ctx.textBaseline='middle';
      for (let i = 0; i < N; i++) {
        const a = (Math.PI*2*i/N) - Math.PI/2;
        const cosA = Math.cos(a), sinA = Math.sin(a);
        ctx.textAlign = Math.abs(cosA) < 0.3 ? 'center' : (cosA > 0 ? 'left' : 'right');
        ctx.fillText(labels[i], cx+(R+12)*cosA, cy+(R+18)*sinA);
      }
    }

    function renderReport(text) {
      const lines = text.split('\n');
      let html = '';
      lines.forEach(line => {
        if (/^━+$/.test(line.trim())) { html += '<hr class="report-divider">'; return; }
        if (/^▼/.test(line.trim())) { html += `<div class="report-section-header">${escHtml(line.trim())}</div>`; return; }
        if (/^【.+】$/.test(line.trim())) { html += `<div class="report-block-title">${escHtml(line.trim())}</div>`; return; }
        if (/^・.+：[\d.]+\s*\/\s*5\.0/.test(line.trim())) {
          const match = line.match(/^・(.+)：([\d.]+)\s*\/\s*5\.0/);
          if (match) {
            const val = parseFloat(match[2]), pct = Math.round(val/5*100);
            const cls = val>=3.5?'#10B981':val>=2.5?'#F59E0B':'#EF4444';
            html += `<div class="report-score-row"><div class="report-score-label">${escHtml(match[1])}</div><div class="report-score-bar-wrap"><div class="report-score-bar" style="width:${pct}%;background:${cls};"></div></div><div class="report-score-num" style="color:${cls};">${val}</div></div>`;
            return;
          }
        }
        if (/^\d+\.\s/.test(line.trim())) { html += `<div class="report-list-item">${renderInline(line.trim())}</div>`; return; }
        if (/^●/.test(line.trim())) { html += `<div class="report-bullet">${renderInline(line.trim())}</div>`; return; }
        if (line.trim() === '') { html += '<div class="report-spacer"></div>'; return; }
        html += `<div class="report-line">${renderInline(line)}</div>`;
      });
      return html;
    }

    function renderInline(text) { return escHtml(text).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
